<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — ToolVerse</title>
<meta name="description" content="Link, metin veya kartvizit için ücretsiz QR kod oluştur ve indir.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#FAFAFF; --surface:rgba(255,255,255,0.6); --surface-solid:#fff;
    --border:rgba(20,20,40,0.08); --text:#14142B; --muted:#6B6B85;
    --indigo:#5B5FEF; --teal:#14C8A4;
    --shadow:0 8px 30px rgba(20,20,60,0.07); --radius:18px;
  }
  [data-theme="dark"]{
    --bg:#0B0E1A; --surface:rgba(255,255,255,0.045); --surface-solid:#131629;
    --border:rgba(255,255,255,0.09); --text:#F2F2FA; --muted:#8D8FA8;
    --shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; transition:background .3s,color .3s;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit; text-decoration:none;}
  header{ display:flex; justify-content:space-between; align-items:center; padding:18px 6%; border-bottom:1px solid var(--border); backdrop-filter: blur(14px); position:sticky; top:0; background: color-mix(in srgb, var(--bg) 70%, transparent); z-index:10;}
  .logo{ display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo .dot{ width:9px; height:9px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--teal)); }
  .back{ font-size:13px; color:var(--muted); font-weight:500;}
  .theme-toggle{ width:40px; height:40px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  main{ max-width:640px; margin:0 auto; padding:50px 6% 100px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); padding:6px 14px; border-radius:100px; font-size:12.5px; font-weight:600; color:var(--indigo); margin-bottom:18px;}
  h1{ font-size:32px; margin-bottom:8px; letter-spacing:-0.5px;}
  .sub{ color:var(--muted); font-size:14.5px; margin-bottom:30px;}
  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px; backdrop-filter:blur(14px); box-shadow:var(--shadow);}
  .tabs{ display:flex; gap:8px; margin-bottom:20px;}
  .tab{ padding:9px 16px; border-radius:100px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); color:var(--muted);}
  .tab.active{ background:var(--indigo); color:white; border-color:var(--indigo);}
  input[type=text], input[type=url]{
    width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--border);
    background:var(--surface-solid); color:var(--text); font-size:14.5px; outline:none; margin-bottom:14px;
    font-family:'Inter',sans-serif;
  }
  input:focus{ border-color:var(--indigo); }
  .size-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
  .size-row label{ font-size:13.5px; font-weight:500; }
  #qrPreview{ display:flex; justify-content:center; padding:24px; background:white; border-radius:14px; margin-bottom:18px; min-height:240px; align-items:center;}
  .btn{ width:100%; padding:15px; border:none; border-radius:12px; font-weight:700; font-size:14.5px; cursor:pointer;}
  .btn.primary{ background:linear-gradient(120deg,var(--indigo),var(--teal)); color:white; margin-bottom:10px;}
  .btn.ghost{ background:var(--surface-solid); border:1px solid var(--border); color:var(--text);}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div><span class="display">ToolVerse</span></div>
  <a class="back" href="../index.html">← Tüm araçlar</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
</header>
<main>
  <div class="eyebrow">▦ RESİM ARACI</div>
  <h1 class="display">QR Code Generator</h1>
  <p class="sub">Link, metin, telefon veya wifi bilgisi için anında QR kod oluştur ve PNG olarak indir.</p>

  <div class="panel">
    <div class="tabs">
      <div class="tab active" data-type="url">Link</div>
      <div class="tab" data-type="text">Metin</div>
      <div class="tab" data-type="tel">Telefon</div>
      <div class="tab" data-type="email">E-posta</div>
    </div>
    <input type="text" id="qrInput" placeholder="https://ornek.com">

    <div class="size-row">
      <label>Boyut</label>
      <select id="sizeSelect" style="padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface-solid); color:var(--text);">
        <option value="180">Küçük (180px)</option>
        <option value="240" selected>Orta (240px)</option>
        <option value="320">Büyük (320px)</option>
      </select>
    </div>

    <div id="qrPreview"></div>

    <button class="btn primary" id="downloadBtn">PNG Olarak İndir</button>
    <button class="btn ghost" id="generateBtn">QR Kodu Güncelle</button>
  </div>
</main>
<script>
  const root = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  function setTheme(t){ root.setAttribute('data-theme',t); themeToggle.textContent = t==='dark' ? '☀️' : '🌙'; }
  setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  themeToggle.onclick = ()=> setTheme(root.getAttribute('data-theme')==='dark' ? 'light':'dark');

  const qrInput = document.getElementById('qrInput');
  const sizeSelect = document.getElementById('sizeSelect');
  const preview = document.getElementById('qrPreview');
  const tabs = document.querySelectorAll('.tab');
  let activeType = 'url';
  let qrInstance = null;

  const placeholders = {
    url: 'https://ornek.com',
    text: 'Buraya herhangi bir metin yaz',
    tel: '+905551234567',
    email: 'ornek@eposta.com'
  };

  tabs.forEach(tab=>{
    tab.onclick = ()=>{
      tabs.forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      activeType = tab.dataset.type;
      qrInput.placeholder = placeholders[activeType];
      qrInput.value = '';
      generate();
    };
  });

  function buildValue(){
    const v = qrInput.value.trim();
    if(!v) return '';
    if(activeType === 'tel') return 'tel:' + v;
    if(activeType === 'email') return 'mailto:' + v;
    return v;
  }

  function generate(){
    const value = buildValue() || placeholders[activeType];
    preview.innerHTML = '';
    const size = parseInt(sizeSelect.value);
    qrInstance = new QRCode(preview, {
      text: value,
      width: size,
      height: size,
      colorDark: '#14142B',
      colorLight: '#ffffff'
    });
  }

  qrInput.addEventListener('input', generate);
  sizeSelect.addEventListener('change', generate);
  document.getElementById('generateBtn').onclick = generate;

  document.getElementById('downloadBtn').onclick = ()=>{
    const img = preview.querySelector('img') || preview.querySelector('canvas');
    if(!img) return;
    const link = document.createElement('a');
    link.download = 'qrcode-toolverse.png';
    link.href = img.tagName === 'CANVAS' ? img.toDataURL('image/png') : img.src;
    link.click();
  };

  generate();
</script>
</body>
</html>
