<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — ToolVerse</title>
<meta name="description" content="Benzersiz UUID v4 (GUID) değerleri anında oluştur.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFF; --surface:rgba(255,255,255,0.6); --surface-solid:#fff;
    --border:rgba(20,20,40,0.08); --text:#14142B; --muted:#6B6B85;
    --indigo:#5B5FEF; --teal:#14C8A4;
    --shadow:0 8px 30px rgba(20,20,60,0.07); --radius:18px;
  }
  [data-theme="dark"]{
    --bg:#0B0E1A; --surface:rgba(255,255,255,0.045); --surface-solid:#131629;
    --border:rgba(255,255,255,0.09); --text:#F2F2FA; --muted:#8D8FA8;
    --shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; transition:background .3s,color .3s;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit; text-decoration:none;}
  header{ display:flex; justify-content:space-between; align-items:center; padding:18px 6%; border-bottom:1px solid var(--border); backdrop-filter: blur(14px); position:sticky; top:0; background: color-mix(in srgb, var(--bg) 70%, transparent); z-index:10;}
  .logo{ display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo .dot{ width:9px; height:9px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--teal)); }
  .back{ font-size:13px; color:var(--muted); font-weight:500;}
  .theme-toggle{ width:40px; height:40px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  main{ max-width:680px; margin:0 auto; padding:50px 6% 100px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); padding:6px 14px; border-radius:100px; font-size:12.5px; font-weight:600; color:var(--indigo); margin-bottom:18px;}
  h1{ font-size:32px; margin-bottom:8px; letter-spacing:-0.5px;}
  .sub{ color:var(--muted); font-size:14.5px; margin-bottom:30px;}
  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; backdrop-filter:blur(14px); box-shadow:var(--shadow);}
  .controls{ display:flex; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap;}
  .controls label{ font-size:13.5px; font-weight:600;}
  .controls input[type=number]{
    width:80px; padding:9px 12px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface-solid); color:var(--text); font-family:'JetBrains Mono',monospace;
  }
  .btn{ padding:11px 20px; border-radius:10px; border:none; font-weight:700; font-size:13.5px; cursor:pointer; background:linear-gradient(120deg,var(--indigo),var(--teal)); color:white;}
  .btn.ghost{ background:var(--surface-solid); border:1px solid var(--border); color:var(--text);}
  #uuidList{ display:flex; flex-direction:column; gap:8px; }
  .uuid-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--surface-solid); border:1px solid var(--border); border-radius:10px; padding:12px 14px;
    font-size:13.5px;
  }
  .uuid-row button{ background:none; border:none; color:var(--indigo); cursor:pointer; font-size:16px; flex-shrink:0;}
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120%); background:var(--text); color:var(--bg); padding:13px 22px; border-radius:10px; font-size:13.5px; font-weight:600; transition: transform .3s ease; z-index:100;}
  .toast.show{ transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div><span class="display">ToolVerse</span></div>
  <a class="back" href="../index.html">← Tüm araçlar</a>
  <div class="theme-toggle" id="themeToggle">🌙</div>
</header>
<main>
  <div class="eyebrow"># GELİŞTİRİCİ ARACI</div>
  <h1 class="display">UUID Generator</h1>
  <p class="sub">Kriptografik olarak güvenli, benzersiz UUID v4 değerleri üret.</p>

  <div class="panel">
    <div class="controls">
      <label>Adet</label>
      <input type="number" id="count" min="1" max="100" value="5">
      <button class="btn" id="generateBtn">Üret</button>
      <button class="btn ghost" id="copyAllBtn">Tümünü Kopyala</button>
    </div>
    <div id="uuidList"></div>
  </div>
</main>
<div class="toast" id="toast">Kopyalandı ✓</div>
<script>
  const root = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  function setTheme(t){ root.setAttribute('data-theme',t); themeToggle.textContent = t==='dark' ? '☀️' : '🌙'; }
  setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  themeToggle.onclick = ()=> setTheme(root.getAttribute('data-theme')==='dark' ? 'light':'dark');

  const list = document.getElementById('uuidList');
  const countInput = document.getElementById('count');
  const toast = document.getElementById('toast');

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=> toast.classList.remove('show'), 1600);
  }

  function generate(){
    const n = Math.min(Math.max(parseInt(countInput.value)||1, 1), 100);
    list.innerHTML = '';
    for(let i=0;i<n;i++){
      const id = crypto.randomUUID();
      const row = document.createElement('div');
      row.className = 'uuid-row';
      row.innerHTML = '<span class="mono">'+id+'</span><button title="Kopyala">⧉</button>';
      row.querySelector('button').onclick = ()=>{
        navigator.clipboard.writeText(id);
        showToast('UUID kopyalandı ✓');
      };
      list.appendChild(row);
    }
  }

  document.getElementById('generateBtn').onclick = generate;
  document.getElementById('copyAllBtn').onclick = ()=>{
    const all = Array.from(list.querySelectorAll('.mono')).map(el=>el.textContent).join('\n');
    if(!all) return;
    navigator.clipboard.writeText(all);
    showToast('Tümü kopyalandı ✓');
  };

  generate();
</script>
</body>
</html>
