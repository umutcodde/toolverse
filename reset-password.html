<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Sıfırla — ToolVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFF; --surface:rgba(255,255,255,0.6); --surface-solid:#fff;
    --border:rgba(20,20,40,0.08); --text:#14142B; --muted:#6B6B85;
    --indigo:#5B5FEF; --teal:#14C8A4; --danger:#E5484D;
    --shadow:0 8px 30px rgba(20,20,60,0.07); --radius:18px;
  }
  [data-theme="dark"]{
    --bg:#0B0E1A; --surface:rgba(255,255,255,0.045); --surface-solid:#131629;
    --border:rgba(255,255,255,0.09); --text:#F2F2FA; --muted:#8D8FA8;
    --shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column;}
  .display{font-family:'Space Grotesk',sans-serif;}
  a{color:inherit; text-decoration:none;}
  header{ display:flex; justify-content:space-between; align-items:center; padding:18px 6%;}
  .logo{ display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo .dot{ width:9px; height:9px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--teal)); }
  .back{ font-size:13px; color:var(--muted); font-weight:500;}
  main{ flex:1; display:flex; align-items:center; justify-content:center; padding: 20px 6% 60px;}
  .card{
    width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:36px; backdrop-filter:blur(14px); box-shadow:var(--shadow);
  }
  h1{ font-size:24px; margin-bottom:6px; letter-spacing:-0.5px;}
  .sub{ color:var(--muted); font-size:13.5px; margin-bottom:26px;}
  .field{ margin-bottom:16px;}
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px;}
  .field input{
    width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-solid); color:var(--text); font-size:14px; outline:none;
  }
  .field input:focus{ border-color:var(--indigo); }
  .btn{ width:100%; padding:14px; border:none; border-radius:10px; font-weight:700; font-size:14.5px; cursor:pointer; background:linear-gradient(120deg,var(--indigo),var(--teal)); color:white; margin-top:6px;}
  .btn:disabled{ opacity:0.6; cursor:not-allowed;}
  .msg{ margin-top:14px; font-size:13px; padding:11px 14px; border-radius:10px; display:none;}
  .msg.error{ background:color-mix(in srgb, var(--danger) 12%, transparent); color:var(--danger); display:block;}
  .msg.success{ background:color-mix(in srgb, var(--teal) 14%, transparent); color:var(--teal); display:block; font-weight:600;}
  .email-badge{ font-size:13px; color:var(--muted); margin-bottom:18px; background:var(--surface-solid); border:1px solid var(--border); padding:10px 14px; border-radius:10px;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div><span class="display">ToolVerse</span></div>
  <a class="back" href="../index.html">← Ana sayfa</a>
</header>
<main>
  <div class="card">
    <h1 class="display">Yeni Şifre Belirle</h1>
    <p class="sub" id="subText">Bağlantı doğrulanıyor...</p>
    <div class="email-badge" id="emailBadge" style="display:none;"></div>

    <form id="resetForm" style="display:none;">
      <div class="field">
        <label for="password">Yeni Şifre</label>
        <input type="password" id="password" required minlength="8" placeholder="En az 8 karakter" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="password2">Yeni Şifre (Tekrar)</label>
        <input type="password" id="password2" required minlength="8" placeholder="Şifreni tekrar gir" autocomplete="new-password">
      </div>
      <button class="btn" type="submit" id="submitBtn">Şifreyi Güncelle</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, verifyPasswordResetCode, confirmPasswordReset
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { firebaseConfig } from "../assets/firebase-config.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const subText = document.getElementById('subText');
  const emailBadge = document.getElementById('emailBadge');
  const form = document.getElementById('resetForm');
  const msg = document.getElementById('msg');
  const submitBtn = document.getElementById('submitBtn');

  function showMsg(text, type){ msg.textContent = text; msg.className = 'msg ' + type; }

  // Firebase, e-postadaki bağlantıya mode=resetPassword&oobCode=XYZ parametrelerini ekler.
  // Bu URL'in doğrudan bu sayfaya gelmesi için Firebase Console → Authentication →
  // Templates → Password reset → "Customize action URL" kısmına bu sayfanın
  // adresini (örn. https://senin-domainin/auth/reset-password.html) yazman gerekir.
  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get('oobCode');

  let verifiedEmail = null;

  async function init(){
    if(!oobCode){
      subText.textContent = 'Geçersiz veya eksik sıfırlama bağlantısı. E-postandaki linki tekrar kontrol et.';
      return;
    }
    try{
      verifiedEmail = await verifyPasswordResetCode(auth, oobCode);
      subText.textContent = 'Hesabın için yeni bir şifre gir.';
      emailBadge.textContent = '👤 ' + verifiedEmail;
      emailBadge.style.display = 'block';
      form.style.display = 'block';
    }catch(err){
      subText.textContent = 'Bu bağlantının süresi dolmuş veya daha önce kullanılmış. Yeni bir sıfırlama bağlantısı iste.';
    }
  }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if(password !== password2){ showMsg('Şifreler eşleşmiyor.', 'error'); return; }
    const strongEnough = /^(?=.*[A-Z])(?=.*\d).{8,}$/.test(password);
    if(!strongEnough){ showMsg('Şifre en az 8 karakter, bir büyük harf ve bir rakam içermeli.', 'error'); return; }

    submitBtn.disabled = true; submitBtn.textContent = 'Güncelleniyor...';

    try{
      await confirmPasswordReset(auth, oobCode, password);
      showMsg('✓ Şifren güncellendi! Girişe yönlendiriliyorsun...', 'success');
      form.style.display = 'none';
      setTimeout(()=> window.location.href = 'login.html', 1200);
    }catch(err){
      showMsg('Şifre güncellenemedi, bağlantının süresi dolmuş olabilir.', 'error');
      submitBtn.disabled = false; submitBtn.textContent = 'Şifreyi Güncelle';
    }
  });

  init();
</script>
</body>
</html>
