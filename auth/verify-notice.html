<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-posta Doğrulama — ToolVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFF; --surface:rgba(255,255,255,0.6); --surface-solid:#fff;
    --border:rgba(20,20,40,0.08); --text:#14142B; --muted:#6B6B85;
    --indigo:#5B5FEF; --teal:#14C8A4; --danger:#E5484D;
    --shadow:0 8px 30px rgba(20,20,60,0.07); --radius:18px;
  }
  [data-theme="dark"]{
    --bg:#0B0E1A; --surface:rgba(255,255,255,0.045); --surface-solid:#131629;
    --border:rgba(255,255,255,0.09); --text:#F2F2FA; --muted:#8D8FA8;
    --shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column;}
  .display{font-family:'Space Grotesk',sans-serif;}
  a{color:inherit; text-decoration:none;}
  header{ display:flex; justify-content:space-between; align-items:center; padding:18px 6%;}
  .logo{ display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .logo .dot{ width:9px; height:9px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--teal)); }
  .back{ font-size:13px; color:var(--muted); font-weight:500;}
  main{ flex:1; display:flex; align-items:center; justify-content:center; padding: 20px 6% 60px; text-align:center;}
  .card{
    width:100%; max-width:440px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:40px 36px; backdrop-filter:blur(14px); box-shadow:var(--shadow);
  }
  .icon{ font-size:38px; margin-bottom:16px; }
  h1{ font-size:23px; margin-bottom:10px; letter-spacing:-0.5px;}
  p{ color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:22px;}
  .btn{ display:inline-block; padding:13px 26px; border-radius:10px; font-weight:700; font-size:13.5px; background:linear-gradient(120deg,var(--indigo),var(--teal)); color:white;}
  .status-success{ color:var(--teal); font-weight:700;}
  .status-error{ color:var(--danger); font-weight:700;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div><span class="display">ToolVerse</span></div>
  <a class="back" href="../index.html">← Ana sayfa</a>
</header>
<main>
  <div class="card" id="card">
    <div class="icon" id="icon">📧</div>
    <h1 class="display" id="title">Doğrulanıyor...</h1>
    <p id="desc">E-posta adresin kontrol ediliyor, lütfen bekle.</p>
  </div>
</main>
<script>
  const API_BASE = '';
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const icon = document.getElementById('icon');
  const title = document.getElementById('title');
  const desc = document.getElementById('desc');
  const card = document.getElementById('card');

  async function verify(){
    if(!token){
      icon.textContent = '📩';
      title.textContent = 'E-postanı Kontrol Et';
      desc.innerHTML = 'Kayıt sırasında gönderdiğimiz doğrulama bağlantısına tıkla. Gelen kutunda göremiyorsan spam klasörünü de kontrol et.';
      return;
    }
    try{
      const res = await fetch(API_BASE + '/api/auth/verify-email?token=' + encodeURIComponent(token));
      const data = await res.json();
      if(res.ok){
        icon.textContent = '✅';
        title.innerHTML = '<span class="status-success">Doğrulandı!</span>';
        desc.textContent = 'E-posta adresin başarıyla doğrulandı. Artık giriş yapabilirsin.';
        card.insertAdjacentHTML('beforeend', '<a class="btn" href="login.html">Giriş Yap</a>');
      } else {
        icon.textContent = '⚠️';
        title.innerHTML = '<span class="status-error">Doğrulama Başarısız</span>';
        desc.textContent = data.message || 'Bağlantının süresi dolmuş olabilir. Tekrar kayıt olmayı dene.';
      }
    }catch(err){
      icon.textContent = '⚠️';
      title.innerHTML = '<span class="status-error">Sunucuya Ulaşılamadı</span>';
      desc.textContent = 'Backend API henüz bağlı değil olabilir.';
    }
  }
  verify();
</script>
</body>
</html>
